<body>

    <div class="navbar">
        <i class="ri-menu-line menu-btn" id="menuBtn"></i>
        <h2>Admin Panel</h2>
        <i class="ri-user-3-line profile-icon"></i>
    </div>

    <div class="container">
        <div class="sidebar" id="sidebar">
            <ul>
                <li id="signupBtn" onclick="showRegForm()">
                    <i class="ri-user-add-line"></i> Signup</li>
                <li id="loginBtn" onclick="showLoginForm()">
                    <i class="ri-login-box-line"></i> Login</li>
            </ul>
        </div>

        <div class="main-content" id="mainContent">

            <!-- Signup Form -->
            <div class="card" id="signupCard">
                <h2>Signup Form</h2>

                <form id="signupForm">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="signupName" placeholder="Enter your name">
                        <div class="error" id="nameError"></div>
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="text" id="signupEmail" placeholder="Enter your email">
                        <div class="error" id="emailError"></div>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="signupPassword" placeholder="Enter password">
                        <div class="error" id="passwordError"></div>
                    </div>

                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="signupConfirmPassword" placeholder="Confirm password">
                        <div class="error" id="confirmPasswordError"></div>
                    </div>

                    <button class="btn" type="submit">Signup</button>
                    <div class="success" id="signupSuccess"></div>
                </form>
            </div>

            <!-- Login Form -->
            <div class="card" id="loginCard" style="display:none;">
                <h2>Login Form</h2>

                <form id="loginForm">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="text" id="loginEmail" placeholder="Enter your email">
                        <div class="error" id="loginEmailError"></div>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter password">
                        <div class="error" id="loginPasswordError"></div>
                    </div>

                    <button class="btn" type="submit">Login</button>
                    <div class="error" id="loginError"></div>
                    <div class="success" id="loginSuccess"></div>
                </form>
            </div>

        </div>
    </div>
