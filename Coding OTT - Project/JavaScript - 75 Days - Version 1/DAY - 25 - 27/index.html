<body>

    <div class="container">
        <div class="card">
            <h1><i class="ri-message-3-line"></i> Message Repeater</h1>
            <p class="subtitle">Enter a message and repeat count (1 to 10)</p>

            <div class="input-group">
                <label>Enter Message</label>
                <input type="text" id="message" placeholder="Type your message..." />
            </div>

            <div class="input-group">
                <label>Repeat Number (1 - 10)</label>
                <input type="number" id="repeatCount" placeholder="Enter repeat number..." />
            </div>

            <button onclick="repeatMessage()">
                <i class="ri-loop-right-line"></i> Repeat Message
            </button>

            <p id="error" class="error"></p>

            <div class="output-box">
                <h2><i class="ri-file-text-line"></i> Output</h2>
                <pre id="output"></pre>
            </div>
        </div>
    </div>
