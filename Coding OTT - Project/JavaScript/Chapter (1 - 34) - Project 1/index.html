<body>

    <div class="app">
        <div class="card">
            <h1>To-Do List</h1>
            <p class="subtitle">Manage your daily tasks professionally.</p>

            <div class="input-area">
                <input type="text" id="taskInput" placeholder="Enter a new task..." />
                <button id="addBtn" onclick="addTask()">Add</button>
            </div>

            <p id="errorMsg" class="error"></p>

            <div class="info-bar">
                <span>Total Tasks: <b id="taskCount">0</b></span>
                <button id="clearAllBtn" class="clear-btn" onclick="clearAllTask()">Clear All</button>
            </div>

            <ul id="taskList" class="task-list"></ul>
        </div>
    </div>
