<body>

    <div class="quiz-container">

        <!-- QUIZ SCREEN -->
        <div class="quiz-screen" id="quizScreen">

            <div class="quiz-header">
                <h2>🔥 Quiz App (MCQ System)</h2>
                <div class="score-box">
                    Score: <span id="score">0</span>
                </div>
            </div>

            <div class="question-box">
                <h1 id="questionText">Question will appear here...</h1>
            </div>

            <div class="options" id="optionsBox">
                <button class="option-btn" id="optionsBtn1">A) Option 1</button>
                <button class="option-btn" id="optionsBtn2">B) Option 2</button>
                <button class="option-btn" id="optionsBtn3">C) Option 3</button>
                <button class="option-btn" id="optionsBtn4">D) Option 4</button>
            </div>

            <div class="quiz-footer">
                <div class="progress">
                    Question <span id="currentQ">1</span> / <span id="totalQ">-</span>
                </div>

                <button class="next-btn" id="nextBtn" disabled>Next</button>
            </div>

        </div>


        <!-- RESULT SCREEN -->
        <div class="result-screen" id="resultScreen">
            <h1>🎉 Quiz Completed!</h1>
            <p>Your Score: <span id="finalScore">0</span> / <span id="finalTotal">-</span></p>

            <button class="restart-btn" id="restartBtn">Restart Quiz</button>
        </div>

    </div>
