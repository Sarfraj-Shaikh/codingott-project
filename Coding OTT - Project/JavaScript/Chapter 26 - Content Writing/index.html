    <div class="container">

        <div class="box" id="contain">
            
        </div>

        <div class="box">
            <h2>Paragraph Generator</h2>
            <input type="text" id="paraInput" placeholder="Enter paragraph text">
            <button onclick="paraGenerator()">Add Paragraph</button>
            <div id="paraArea"></div>
        </div>

        <div class="box">
            <h2>Dynamic List Generator</h2>
            <input type="text" id="listInput" placeholder="Enter list item">
            <button onclick="addListItem()">Add Item</button>
            <ul id="listArea"></ul>
        </div>

        <div class="box">
            <h2>Profile Card</h2>
            <input type="text" id="nameInput" placeholder="Enter name">
            <input type="text" id="descInput" placeholder="Enter description">
            <button onclick="createProfile()">Create Profile</button>
            <div id="profileArea"></div>
        </div>

        <div class="box">
            <h2>Notification</h2>
            <button onclick="showSuccess()">Show Success</button>
            <button onclick="showWarning()">Show Warning</button>
            <div id="notifyArea"></div>
        </div>

        <div class="box">
            <h2>Button Creator</h2>
            <button onclick="createButton()">Create New Button</button>
            <div id="buttonArea"></div>
        </div>
