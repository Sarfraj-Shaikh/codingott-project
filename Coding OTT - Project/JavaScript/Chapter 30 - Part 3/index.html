<body>

    <div class="fb-container">
        <div class="fb-card">
            <h1 class="fb-logo">FACEBOOK</h1>
            <p class="fb-text">Create a new account</p>
            <p class="fb-subtext">Made By Sarfraj</p>

            <form class="fb-form">
                <div class="row">
                    <div class="input-box">
                        <input type="text" id="fname" placeholder="First name" onblur="nameVal()">
                        <span class="warning-icon" id="warning-icon">!</span>
                    </div>

                    <div class="input-box">
                        <input type="text" id="lname" placeholder="Surname" onblur="surNameVal()">
                        <span class="warning-icon" id="warningIcon2">!</span>
                    </div>
                </div>

                <div class="input-box full">
                    <input type="text" id="email" placeholder="Mobile number or email address"
                        onblur="numEmailVal()">
                    <span class="warning-icon" id="warningIcon3">!</span>
                </div>

                <div class="input-box full">
                    <input type="password" id="pass" placeholder="New password" onblur="passVal()">
                    <span class="warning-icon" id="warningIcon4">!</span>
                </div>

                <button type="button" class="signup-btn">Sign Up</button>
            </form>
        </div>
    </div>
