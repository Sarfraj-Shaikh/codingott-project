<body>

    <div class="container">
        <h1>Sort 10 Numbers</h1>
        <p class="info">Enter 10 values and press each button to store the number.</p>

        <div class="grid">
            <div class="field">
                <input type="text" placeholder="Enter Number 1" required id="text1">
                <button id="btn1" onclick="addNumOne()">Add 1</button>
            </div>
            
            <div class="field">
                <input type="text" placeholder="Enter Number 2" required id="text2">
                <button id="btn2" onclick="addNumTwo()">Add 2</button>
            </div>
            
            <div class="field">
                <input type="text" placeholder="Enter Number 3" required id="text3">
                <button id="btn3" onclick="addNumThree()">Add 3</button>
            </div>
            
            <div class="field">
                <input type="text" placeholder="Enter Number 4" required id="text4">
                <button id="btn4" onclick="addNumFour()">Add 4</button>
            </div>
            
            <div class="field">
                <input type="text" placeholder="Enter Number 5" required id="text5">
                <button id="btn5" onclick="addNumFive()">Add 5</button>
            </div>
            
            <div class="field">
                <input type="text" placeholder="Enter Number 6" required id="text6">
                <button id="btn6" onclick="addNumSix()">Add 6</button>
            </div>
            
            <div class="field">
                <input type="text" placeholder="Enter Number 7" required id="text7">
                <button id="btn7" onclick="addNumSeven()">Add 7</button>
            </div>
            
            <div class="field">
                <input type="text" placeholder="Enter Number 8" required id="text8">
                <button id="btn8" onclick="addNumEight()">Add 8</button>
            </div>
            
            <div class="field">
                <input type="text" placeholder="Enter Number 9" required id="text9">
                <button id="btn9" onclick="addNumNine()">Add 9</button>
            </div>
            
            <div class="field">
                <input type="text" placeholder="Enter Number 10" required id="text10">
                <button id="btn10" onclick="addNumTen()">Add 10</button>
            </div>
        </div>
        
        <div class="output-box">
            <h2>Sorted Output</h2>

            <div class="result">
                <h3>Numbers</h3>
                <p class="output" id="arrayNums">Waiting for input...</p>
            </div>

            <div class="result">
                <h3>Ascending Order</h3>
                <p class="output" id="ascendingResult">Waiting for input...</p>
            </div>

            <div class="result">
                <h3>Descending Order</h3>
                <p class="output" id="descendingResult">Waiting for input...</p>
            </div>
        </div>
    </div>
