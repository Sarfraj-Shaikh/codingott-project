        <div class="card">
            <h2>Task 1</h2>
            <p class="desc">Print all natural numbers from 1 to n. </p>

            <div class="input-group">
                <input type="number" id="t1Input" placeholder="Enter a number (e.g. 20)">

            </div>

            </div>

        </div>

        <div class="card">
