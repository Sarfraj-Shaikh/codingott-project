<body>

    <div class="card-form-container">
        <h2>Card Number</h2>
        <p>Please enter your 16-digit credit/debit card number.</p>

        <div class="inputs-wrapper">
            <input type="text" inputmode="numeric" maxlength="4" placeholder="1234" class="card-input" id="card-1" autocomplete="off" oninput="autoFocus(this, 'card-2')" onkeydown="moveBack(event, this, 'card-1')"/>

            <input type="text" inputmode="numeric" maxlength="4" placeholder="5678" class="card-input" id="card-2" autocomplete="off" oninput="autoFocus(this, 'card-3')" onkeydown="moveBack(event, this, 'card-1')"/>

            <input type="text" inputmode="numeric" maxlength="4" placeholder="9012" class="card-input" id="card-3" autocomplete="off" oninput="autoFocus(this, 'card-4')" onkeydown="moveBack(event, this, 'card-2')"/>

            <input type="text" inputmode="numeric" maxlength="4" placeholder="3456" class="card-input" id="card-4" autocomplete="off" onkeydown="moveBack(event, this, 'card-3')"/>
        </div>

        <p class="note">
            Credit: Made with <span>🫀</span> by Sarfraj Shaikh
        </p>
    </div>
