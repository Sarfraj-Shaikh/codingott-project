    <div class="cookie-app">
        <h2>Cookies CRUD Project</h2>
        <p>
            Use the form below to <b>Create</b>, <b>Read</b>, <b>Update</b>, and <b>Delete</b> cookies.
            Output will be displayed in text form.
        </p>

        <div class="form-grid">
            <div class="form-group">
                <label for="cookieName">Cookie Name</label>
                <input type="text" id="cookieName" placeholder="Enter cookie name e.g. user" />
            </div>

            <div class="form-group">
                <label for="cookieValue">Cookie Value</label>
                <input type="text" id="cookieValue" placeholder="Enter cookie value e.g. Sarfraj" />
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-create" id="createBtn">Create Cookie</button>
            <button class="btn-read" id="readBtn">Read Cookie</button>
            <button class="btn-update" id="updateBtn">Update Cookie</button>
            <button class="btn-delete" id="deleteBtn">Delete Cookie</button>
        </div>

        <div class="output-box">
            <h3>Result Output</h3>
            <p id="output">No operation performed yet.</p>
        </div>
    </div>
