<body>

    <div class="login-container">
        <h2>Login</h2>
        <p>Please enter your username and password to access your account.</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" autocomplete="off" required />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" autocomplete="off" required />
            </div>

            <div class="bottom-row">
                <label class="remember-box">
                    <input type="checkbox" id="rememberMe" />
                    Remember Me
                </label>

                <button type="button" class="login-btn" id="loginBtn">
                    Login
                </button>
            </div>
        </form>

        <p class="footer-text">
            Forgot your password? <a href="#">Reset</a>
        </p>
    </div>
