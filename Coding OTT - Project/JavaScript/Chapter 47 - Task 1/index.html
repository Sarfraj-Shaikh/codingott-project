<body>

    <div class="download-container">
        <h2>Auto Image Download</h2>
        <p>
            Image will automatically download after <span id="countdown2"><b>-</b></span>.
            You can also click the button to download instantly.
        </p>

        <div class="image-preview">
            <img id="downloadImage" src="./beautiful-natural.jpg" alt="Download Preview" download/>
        </div>

        <div class="countdown-box" id="countBox">
            Download starts in <span id="countdown">-</span> seconds...
        </div>

        <div class="btn-row">
            <button class="download-btn" id="downloadBtn">
                Download Now
            </button>

            <button class="reset-btn" id="resetBtn">
                Restart Countdown
            </button>
        </div>
    </div>

    <!-- Hidden download link -->
    <a id="hiddenDownloadLink" style="display:none;" download="download-image.jpg"></a>
