<body>

    <div class="container">
        <h2>Cookie Storage Form</h2>
        <p>
            Enter your details below. Your Name, Email and Password will be stored in
            separate cookies. Stored cookie data will appear below.
        </p>

        <form id="cookieForm">
            <div class="form-group">
                <label for="nameInput">Name</label>
                <input type="text" id="nameInput" placeholder="Enter your name"/>
            </div>

            <div class="form-group">
                <label for="emailInput">Email</label>
                <input type="email" id="emailInput" placeholder="Enter your email" />
            </div>

            <div class="form-group">
                <label for="passwordInput">Password</label>
                <input type="password" id="passwordInput" placeholder="Enter password" />
            </div>

            <div class="btn-row">
                <button type="button" id="saveBtn">Save in Cookies</button>
                <button type="button" id="clearBtn">Clear Cookies</button>
            </div>
        </form>

        <div class="data-box">
            <h3>Stored Cookie Data</h3>

            <p id="storedName">Name: <span class="empty-msg">Empty</span></p>
            <p id="storedEmail">Email: <span class="empty-msg">Empty</span></p>
            <p id="storedPassword">Password: <span class="empty-msg">Empty</span></p>
        </div>
    </div>
