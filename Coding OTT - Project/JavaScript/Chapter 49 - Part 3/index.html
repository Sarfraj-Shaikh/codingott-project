<body>

    <div class="product-page">

        <div class="product-view">

            <!-- Image Gallery -->
            <div class="product-gallery">

                <button class="nav-btn left" id="prevBtn">&#10094;</button>

                <div class="image-track" id="imageTrack">
                    <img src="https://www.gonoise.com/cdn/shop/files/Artboard_46.webp" alt="Product Image 1" loading="lazy">
                    <img src="https://www.gonoise.com/cdn/shop/files/Artboard_43.webp" alt="Product Image 2" loading="lazy">
                    <img src="https://www.gonoise.com/cdn/shop/files/Artboard_44.webp" alt="Product Image 3" loading="lazy">
                    <img src="https://www.gonoise.com/cdn/shop/files/Artboard_47.webp" alt="Product Image 4" loading="lazy">
                </div>

                <button class="nav-btn right" id="nextBtn">&#10095;</button>

            </div>

            <!-- Product Info -->
            <div class="product-details">

                <h1 class="product-title" id="productName">
                    Apple iPhone 15 Pro Max (256 GB) - Natural Titanium
                </h1>

                <p class="product-price" id="productPrice">
                    ₹1,49,999
                    <span class="old-price">₹1,59,999</span>
                    <span class="discount">6% off</span>
                </p>

                <p class="product-desc">
                    Premium flagship smartphone with advanced camera system, titanium build,
                    and ultra-fast performance. Flipkart-style layout demo.
                </p>

                <!-- CTA Buttons -->
                <div class="cta-buttons">
                    <button class="btn buy-btn" id="buyNowBtn">Buy Now</button>
                    <button class="btn cart-btn" id="addToCartBtn">Add to Cart</button>
                </div>

            </div>

        </div>

    </div>
