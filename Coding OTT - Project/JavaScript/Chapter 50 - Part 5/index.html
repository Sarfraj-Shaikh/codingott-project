<body>

  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">SS</div>
        <div class="brand-text">
          <h1>Session Storage CRUD</h1>
          <p>Create, Read, Update, Delete (Session Storage Based)</p>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="card form-card">
        <h2 class="title">Add / Update User</h2>

        <form id="userForm">
          <div class="grid">
            <div class="field">
              <label>User ID</label>
              <input type="text" id="userId" placeholder="Enter unique ID (e.g. 101)" required />
            </div>

            <div class="field">
              <label>Full Name</label>
              <input type="text" id="userName" placeholder="Enter full name" required />
            </div>

            <div class="field">
              <label>Email</label>
              <input type="email" id="userEmail" placeholder="Enter email address" required />
            </div>

            <div class="field">
              <label>Phone</label>
              <input type="text" id="userPhone" inputmode="numeric" maxlength="10" placeholder="Enter phone number" required />
            </div>
          </div>

          <div class="btn-group">
            <button type="button" class="btn primary" id="saveBtn">Save (Create)</button>
            <button type="button" class="btn warning" id="updateBtn">Update</button>
            <button type="button" class="btn dark" id="resetBtn">Reset</button>
          </div>
        </form>
      </section>

      <section class="card table-card">
        <div class="table-top">
          <h2 class="title">Stored Users</h2>
          <button class="btn danger" id="clearAllBtn" onclick="clearAllData()">Clear All</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Actions</th>
              </tr>
            </thead>

            <tbody id="userTable">
              <!-- Dynamic Data -->
            </tbody>
          </table>
        </div>
      </section>

      <section class="card output-card">
        <h2 class="title">Operation Output</h2>
        <div class="output-box" id="outputBox">
          Waiting for operations...
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>Made by Sarfraj Shaikh</p>
    </footer>
  </div>
